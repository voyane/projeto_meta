<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Demonstração Metamorphose Fit</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(1100px, 100%);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(26px, 4vw, 44px);
    }

    p {
      margin: 0 0 20px;
      color: #cbd5e1;
      line-height: 1.5;
    }

    video {
      width: 100%;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 14px;
      background: #020617;
      box-shadow: 0 24px 60px rgba(0,0,0,.45);
    }

    .chapters {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 10px;
    }

    button {
      border: 1px solid rgba(255,255,255,.15);
      background: #1e293b;
      color: #f8fafc;
      padding: 12px 14px;
      border-radius: 10px;
      text-align: left;
      cursor: pointer;
    }

    button:hover {
      background: #223fad;
    }
  </style>
</head>
<body>
  <main>
    <h1>Demonstração Metamorphose Fit</h1>
    <p>Vídeo demonstrativo do funcionamento principal do sistema: catálogo, carrinho, pagamento e área administrativa.</p>

    <video id="demoVideo" controls preload="metadata">
      <source src="metamorphose-fit-demo.webm" type="video/webm">
      <track src="metamorphose-fit-demo.vtt" kind="captions" srclang="pt" label="Português" default>
      O seu navegador não suporta vídeo HTML5.
    </video>

    <div class="chapters">
      <button data-time="0">Abertura</button>
      <button data-time="12">Página inicial</button>
      <button data-time="35">Produtos</button>
      <button data-time="65">Detalhe e carrinho</button>
      <button data-time="92">Pagamento</button>
      <button data-time="148">Admin</button>
    </div>
  </main>

  <script>
    const video = document.getElementById("demoVideo");

    document.querySelectorAll("[data-time]").forEach((button) => {
      button.addEventListener("click", () => {
        video.currentTime = Number(button.dataset.time);
        video.play();
      });
    });
  </script>
</body>
</html>
