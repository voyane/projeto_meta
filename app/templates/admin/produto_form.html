{% extends "base.html" %}

{% block title %}
{% if produto %}
Editar Produto
{% else %}
Novo Produto
{% endif %}
{% endblock %}

{% block content %}

<section class="admin-form-page">

    <div class="admin-header-div">

        <h1>
            {% if produto %}
                Editar Produto
            {% else %}
                Novo Produto
            {% endif %}
        </h1>

        <a href="{{ url_for('admin.produtos') }}" class="admin-btn">
            Voltar
        </a>

    </div>

    <form
        method="POST"
        enctype="multipart/form-data"
        class="admin-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <!-- Nome -->
        <div class="form-group">

            <label>Nome do Produto</label>

            <input
                type="text"
                name="nome"
                value="{{ produto.nome if produto else '' }}"
                placeholder="Ex.: Hyperbolic Mass 4kg"
                required>

        </div>

        <!-- Categoria -->
        <div class="form-group">

            <label>Categoria</label>

            <select name="categoria" required>

                <option value="">Selecionar categoria</option>

                <option value="hipercalorico"
                    {% if produto and produto.categoria=="hipercalorico" %}selected{% endif %}>
                    Hipercalórico
                </option>

                <option value="proteina"
                    {% if produto and produto.categoria=="proteina" %}selected{% endif %}>
                    Proteína
                </option>

                <option value="creatina"
                    {% if produto and produto.categoria=="creatina" %}selected{% endif %}>
                    Creatina
                </option>

            </select>

        </div>

        <!-- Preço -->
        <div class="form-group">

            <label>Preço (MT)</label>

            <input
                type="number"
                step="0.01"
                min="0"
                name="preco"
                value="{{ produto.preco if produto else '' }}"
                placeholder="2500"
                required>

        </div>

        <!-- STOCK -->
        <div class="form-group">

            <label>Quantidade em Stock</label>

            <input
                type="number"
                name="stock"
                min="0"
                value="{{ produto.stock if produto else 0 }}"
                placeholder="Ex.: 25"
                required>

        </div>

        <!-- Descrição -->
        <div class="form-group">

            <label>Descrição</label>

            <textarea
                name="descricao"
                rows="10"
                placeholder="Descrição completa do produto...">{{ produto.descricao if produto else '' }}</textarea>

        </div>

        <!-- Imagem -->
        <div class="form-group">

            <label>Imagem do Produto</label>

            <input
                type="file"
                name="imagem"
                accept="image/*">

        </div>

        {% if produto and produto.imagem %}

        <div class="form-group">

            <label>Imagem Atual</label>

            <img
                src="{{ url_for('static', filename=produto.imagem) }}"
                style="width:180px; border-radius:10px;">

        </div>

        {% endif %}

        <div class="form-group">
            <label>
                <input
                    type="checkbox"
                    name="ativo"
                    {% if not produto or produto.ativo %}checked{% endif %}>
                Produto ativo
            </label>
        </div>

        <div class="form-group">
            <label>
                <input
                    type="checkbox"
                    name="destaque"
                    {% if produto and produto.destaque %}checked{% endif %}>
                Mostrar em destaque
            </label>
        </div>

        <button type="submit">
            💾 Guardar Produto
        </button>

    </form>

</section>

{% endblock %}
